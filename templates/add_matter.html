<!doctype html>
<html>
<head>
    <title>Add Case</title>

    <style>
        body { font-family: Arial; margin: 0; background: #f4f6f9; }
        .sidebar { width: 220px; height: 100vh; background: #1f2937; color: white; position: fixed; padding: 20px; }
        .sidebar a { display: block; color: white; text-decoration: none; margin: 15px 0; }
        .main { margin-left: 240px; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, select, textarea { width: 400px; padding: 8px; margin: 5px 0; }
        button { padding: 8px 14px; background: #174ea6; color: white; border: none; cursor: pointer; }
        .cancel-link { margin-left: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Your Firm</h2>

    <a href="/">Dashboard</a>
    <a href="/calendar">Calendar</a>
    <a href="/matters">Matters</a>
    <a href="/tasks">Tasks</a>
    <a href="/contacts">Contacts</a>
    <a href="/reports">Reports</a>

    {% if current_user.role == "admin" %}
        <a href="/admin/users">Users</a>
    {% endif %}

    <a href="/logout">Logout</a>
</div>

<div class="main">
    <div class="card">
        <h1>Add Case</h1>

        <form method="POST" action="/matters/new">
            <p>Case Name</p>
            <input name="case_name" required>

            <p>Client Name</p>
            <input name="client_name">

            <p>Case Number</p>
            <input name="case_number">

            <p>Stage</p>
            <input name="stage">

            <p>Status</p>
            <select name="status">
                <option>Open</option>
                <option>Pending</option>
                <option>Closed</option>
            </select>

            <br><br>

            <button type="submit">Save Case</button>
            <a class="cancel-link" href="/matters">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
